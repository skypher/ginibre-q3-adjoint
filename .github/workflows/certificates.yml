name: Certificate build

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/certificates.yml"
      - "ginibre_q3/**"
  pull_request:
    paths:
      - ".github/workflows/certificates.yml"
      - "ginibre_q3/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: certificates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LC_ALL: C
  PYTHONHASHSEED: "0"
  SOURCE_DATE_EPOCH: "1784419200"

jobs:
  certificate-build:
    name: Authenticate and compile certificates
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Select Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install native proof dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            g++ \
            make \
            libgmp-dev \
            libmpfr-dev \
            libomp-dev \
            lmodern \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Record runner resources and toolchain
        run: |
          mkdir -p ci-logs
          {
            echo "cpus=$(nproc)"
            awk '/MemTotal|MemAvailable/ {print}' /proc/meminfo
            g++ --version | head -n 1
            make --version | head -n 1
            python3 --version
            pdflatex --version | head -n 1
          } | tee ci-logs/environment.log

      - name: Authenticate certificate inputs and proof contracts
        run: |
          set -o pipefail
          make -C ginibre_q3 publication-preflight \
            2>&1 | tee ci-logs/publication-preflight.log

      - name: Rebuild and authenticate publication PDFs
        run: |
          set -o pipefail
          make -C ginibre_q3 publication-artifact-audit \
            2>&1 | tee ci-logs/publication-artifacts.log
          git diff --exit-code -- \
            ginibre_q3/paper.pdf \
            ginibre_q3/full_q3_main.pdf \
            ginibre_q3/full_q3_extension.pdf \
            ginibre_q3/submission.pdf

      - name: Compile every clean-room certificate replayer
        run: |
          set -o pipefail
          make -B -C ginibre_q3/character_ring_iter \
            -j"$(nproc)" replay-build \
            2>&1 | tee ci-logs/certificate-build.log

      - name: Run exact certificate smoke checks
        working-directory: ginibre_q3/character_ring_iter
        run: |
          set -o pipefail
          ./verify_sun_repair_certificates_gmp \
            2>&1 | tee ../../ci-logs/sun-repair-smoke.log
          OMP_NUM_THREADS="$(nproc)" \
            ./direct_chain_rect_e8_parallel_certificate \
              --negative-bounds ../certificates/exceptional_rect/e8_rect_negative_bounds.tsv \
              --only n133 \
            2>&1 | tee ../../ci-logs/e8-directed-rounding-smoke.log
          grep -F "SUMMARY cases_checked=1 failed_cases=0 lattice_failures=0 precision_bits=384" \
            ../../ci-logs/e8-directed-rounding-smoke.log
          grep -F "RESULT: ALL PASS" \
            ../../ci-logs/e8-directed-rounding-smoke.log

      - name: Package compiled replayers
        run: |
          set -euo pipefail
          mkdir -p dist
          mapfile -t replay_targets < <(
            make -s -C ginibre_q3/character_ring_iter \
              --eval='print-replay-targets: ; @printf "%s\n" $(REPLAY_TARGETS)' \
              print-replay-targets
          )
          for target in "${replay_targets[@]}"; do
            test -x "ginibre_q3/character_ring_iter/${target}"
          done
          tar -C ginibre_q3/character_ring_iter \
            --sort=name \
            --mtime="@${SOURCE_DATE_EPOCH}" \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf dist/certificate-replayers-linux-x86_64.tar.gz \
            "${replay_targets[@]}"
          sha256sum dist/certificate-replayers-linux-x86_64.tar.gz \
            > dist/certificate-replayers-linux-x86_64.tar.gz.sha256

      - name: Upload compiled certificate replayers
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: certificate-replayers-linux-x86_64
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Upload authenticated publication PDFs
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: publication-pdfs
          path: |
            ginibre_q3/paper.pdf
            ginibre_q3/full_q3_main.pdf
            ginibre_q3/full_q3_extension.pdf
            ginibre_q3/submission.pdf
            ginibre_q3/publication_artifacts.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload build and smoke logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: certificate-build-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

  full-certificate-replay:
    name: Complete clean-room certificate replay
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Select Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install native proof dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            g++ \
            make \
            libgmp-dev \
            libmpfr-dev \
            libomp-dev \
            lmodern \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Record GitHub-hosted runner resources
        run: |
          mkdir -p ci-logs
          {
            echo "cpus=$(nproc)"
            awk '/MemTotal|MemAvailable/ {print}' /proc/meminfo
            g++ --version | head -n 1
            make --version | head -n 1
            python3 --version
            pdflatex --version | head -n 1
          } | tee ci-logs/full-replay-environment.log

      - name: Run clean-room main shard
        run: |
          set -o pipefail
          python3 -u ginibre_q3/clean_room_replay.py \
            --threads "$(nproc)" \
            --max-stage-seconds 420 \
            --max-total-seconds 420 \
            --skip-e8-source-pairing \
            2>&1 | tee ci-logs/full-clean-room-replay.log

      - name: Preserve failed isolated replay workspace
        if: failure()
        run: |
          mkdir -p ci-logs/failed-workspace
          latest="$({
            find /tmp -maxdepth 1 -type d -name 'ginibre-q3-clean-room-*' \
              -printf '%T@ %p\n' 2>/dev/null || true
          } | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [[ -n "${latest}" ]]; then
            cp -a "${latest}/." ci-logs/failed-workspace/
          fi

      - name: Upload complete replay evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: full-certificate-replay-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 30

  e8-source-pairing-replay:
    name: Exact E8 source-pairing replay
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Select Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install exact-arithmetic dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            g++ \
            make \
            libgmp-dev

      - name: Authenticate E8 inputs and build the exact verifier
        run: |
          set -o pipefail
          mkdir -p ci-logs
          make -C ginibre_q3 publication-preflight \
            2>&1 | tee ci-logs/e8-publication-preflight.log
          make -B -C ginibre_q3/character_ring_iter \
            verify_character_ring_moment_sources_gmp \
            2>&1 | tee ci-logs/e8-source-pairing-build.log

      - name: Regenerate all E8 moments through m100
        working-directory: ginibre_q3/character_ring_iter
        run: |
          set -o pipefail
          {
            echo "cpus=$(nproc)"
            sha256sum \
              verify_character_ring_moment_sources_gmp.cpp \
              verify_character_ring_moment_sources_gmp
          } | tee ../../ci-logs/e8-source-pairing-environment.log
          /usr/bin/time -f 'wall_seconds=%e maxrss_kb=%M' \
            timeout --foreground 420s \
            env OMP_NUM_THREADS="$(nproc)" \
            ./verify_character_ring_moment_sources_gmp \
              E8 100 \
              logs/e8_70.log \
              ../references/arxiv_2412_21189_e8_m71_m100.txt \
            2>&1 | tee ../../ci-logs/e8-source-pairing-replay.log
          grep -F \
            "SUMMARY group=E8 moments=101 source_values=101 failures=0" \
            ../../ci-logs/e8-source-pairing-replay.log

      - name: Upload E8 replay evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e8-source-pairing-replay-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 30

  full-q3-extension-replay:
    name: Part III hierarchy main shard
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Select Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install native proof dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            g++ \
            make \
            libgmp-dev \
            libmpfr-dev \
            libomp-dev \
            lmodern \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Run Part III hierarchy main shard
        run: |
          set -o pipefail
          mkdir -p ci-logs
          make -C ginibre_q3 full-q3-extension-main-shard \
            REPLAY_THREADS="$(nproc)" \
            FULL_Q3_BOUNDED_THREADS="$(nproc)" \
            FULL_Q3_MODULAR_THREADS="$(nproc)" \
            REPLAY_MAX_STAGE_SECONDS=420 \
            2>&1 | tee ci-logs/full-q3-extension-replay.log

      - name: Upload Part III replay evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: full-q3-extension-replay-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 30

  full-q3-bounded-littlewood-replay:
    name: Part III exact bounded-Littlewood replay
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Select Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install exact-arithmetic dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            g++ \
            make \
            libgmp-dev

      - name: Authenticate inputs and reconstruct bounded-Littlewood moments
        run: |
          set -o pipefail
          mkdir -p ci-logs
          make -C ginibre_q3 publication-preflight \
            2>&1 | tee ci-logs/bounded-littlewood-preflight.log
          /usr/bin/time -f 'wall_seconds=%e maxrss_kb=%M' \
            make -C ginibre_q3 full-q3-bcd-bounded-littlewood-audit \
              FULL_Q3_BOUNDED_THREADS="$(nproc)" \
              REPLAY_MAX_STAGE_SECONDS=540 \
            2>&1 | tee ci-logs/bounded-littlewood-replay.log

      - name: Upload bounded-Littlewood replay evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: full-q3-bounded-littlewood-replay-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 30
